#########################################################
# CONFIGURACIÓN GENERAL
#########################################################

spring.application.name=clientes_finanzas
server.port=8080

#########################################################
# BASE DE DATOS MYSQL
#########################################################

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/finanzas_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#########################################################
# JPA / HIBERNATE
#########################################################

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#########################################################
# LOGGING
#########################################################

logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

#########################################################
# VALIDACIÓN
#########################################################

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

#########################################################
# SWAGGER (OpenAPI)
#########################################################

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

#########################################################
# ACTUATOR
#########################################################

management.endpoints.web.exposure.include=health,info

#########################################################
# INFORMACIÓN DE LA APLICACIÓN
#########################################################

info.app.name=Clientes Finanzas
info.app.description=Sistema para la administración de clientes, cuentas y transacciones financieras.
info.app.version=1.0.0
